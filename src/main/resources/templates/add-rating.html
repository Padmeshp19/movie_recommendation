<!DOCTYPE html>
<html>
<head>
<title>Add Rating</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1c1c1c;
padding:30px;
border-radius:10px;
width:350px;
}

input, textarea{
width:100%;
margin:10px 0;
padding:10px;
}

button{
background:red;
color:white;
padding:10px;
border:none;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<h2>Rate Movie</h2>

<form action="/ratings/save" method="post">

<input type="hidden" name="movieId" th:value="${movieId}">

<input type="number" name="score" placeholder="Rating (1-10)" required>

<textarea name="review" placeholder="Write review"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
