<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Movie</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba")
no-repeat center center/cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:12px;
color:white;
width:400px;
box-shadow:0px 0px 20px black;
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:red;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:darkred;
}

.back{
display:block;
text-align:center;
margin-top:15px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>✏ Edit Movie</h2>

<form th:action="@{/movies/update/{id}(id=${movie.id})}" method="post">

<input type="text" name="title" th:value="${movie.title}" required>

<input type="text" name="genre" th:value="${movie.genre}" required>

<input type="text" name="language" th:value="${movie.language}" required>

<input type="number" step="0.1" name="rating" th:value="${movie.rating}" required>

<button type="submit">Update Movie</button>

</form>

<a href="/movies" class="back">⬅ Back to Movies</a>

</div>

</body>
</html>
