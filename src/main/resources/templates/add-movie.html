<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Movie</title>
<style>
body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4")
no-repeat center center/cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:12px;
color:white;
width:400px;
box-shadow:0px 0px 20px black;
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-size:12px;
color:#aaa;
margin-top:10px;
display:block;
}

input{
width:100%;
padding:12px;
margin:5px 0 10px 0;
border:none;
border-radius:5px;
background:#1a1a1a;
color:white;
border:1px solid #333;
box-sizing:border-box;
}

input:focus{
outline:none;
border-color:red;
}

input::placeholder{
color:#666;
}

.poster-hint{
font-size:11px;
color:#666;
margin-top:-8px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:red;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{ background:darkred; }

.back{
display:block;
text-align:center;
margin-top:15px;
color:white;
text-decoration:none;
font-size:14px;
}

.back:hover{ color:red; }
</style>
</head>

<body>
<div class="container">

  <h2>&#127909; Add New Movie</h2>

  <form action="/movies" method="post">

    <label>Movie Title</label>
    <input type="text" name="title" placeholder="e.g. Inception" required>

    <label>Genre</label>
    <input type="text" name="genre" placeholder="e.g. Sci-Fi" required>

    <label>Language</label>
    <input type="text" name="language" placeholder="e.g. English" required>

    <label>Rating (0–10)</label>
    <input type="number" step="0.1" min="0" max="10" name="rating" placeholder="e.g. 8.8" required>

    <label>Select Poster</label>
        <select name="posterUrl">
        <option value="">-- Choose Poster --</option>
        <option th:each="p : ${posters}"
                th:value="${p}"
                th:text="${p}">
        </option>
        </select>

    <button type="submit">Save Movie</button>

  </form>

  <a href="/movies" class="back">&#8592; Back to Movies</a>

</div>
</body>
</html>
