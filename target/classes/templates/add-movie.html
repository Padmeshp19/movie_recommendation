<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Movie</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4")
no-repeat center center/cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:12px;
color:white;
width:400px;
box-shadow:0px 0px 20px black;
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:red;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:darkred;
}

.back{
display:block;
text-align:center;
margin-top:15px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>🎬 Add New Movie</h2>

<form action="/movies" method="post">

<input type="text" name="title" placeholder="Movie Title" required>

<input type="text" name="genre" placeholder="Genre" required>

<input type="text" name="language" placeholder="Language" required>

<input type="number" step="0.1" name="rating" placeholder="Rating (0–10)" required>

<button type="submit">Save Movie</button>

</form>

<a href="/movies" class="back">⬅ Back to Movies</a>

</div>

</body>
</html>
