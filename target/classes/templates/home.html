<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Movie App</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba") no-repeat center center/cover;
    color: white;
}
nav {
    background: black;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
nav a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    font-weight: bold;
}
nav a:hover { color: red; }
.nav-left { font-size: 20px; font-weight: bold; }
.nav-right { display: flex; align-items: center; gap: 6px; }
.user-greeting { display: flex; align-items: center; gap: 10px; }
.user-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: red;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    color: white;
}
.user-name { font-size: 14px; color: #ccc; }
.user-name span { color: white; font-weight: bold; }
.btn-logout {
    margin-left: 10px;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    border-radius: 4px;
    font-size: 13px;
    text-decoration: none;
}
.btn-logout:hover { border-color: red; color: red; }
.btn-login {
    padding: 8px 18px;
    background: red;
    color: white;
    border-radius: 4px;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
}
.btn-login:hover { background: #cc0000; color: white; }
.hero {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.6);
    text-align: center;
}
.hero-welcome {
    font-size: 20px;
    color: #f87171;
    margin-bottom: 10px;
    font-weight: bold;
    letter-spacing: 1px;
}
.hero h1 { font-size: 58px; margin-bottom: 10px; line-height: 1.1; }
.hero p { font-size: 18px; margin-bottom: 30px; color: #ccc; }
.hero-buttons { display: flex; gap: 15px; }
.btn-primary {
    padding: 15px 30px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    text-decoration: none;
    border-radius: 4px;
}
.btn-primary:hover { background: #cc0000; }
.btn-secondary {
    padding: 15px 30px;
    font-size: 18px;
    background: transparent;
    color: white;
    border: 2px solid white;
    cursor: pointer;
    text-decoration: none;
    border-radius: 4px;
}
.btn-secondary:hover { background: white; color: black; }
</style>
</head>
<body>

<nav>
    <div class="nav-left">🎬 MovieApp</div>
    <div class="nav-right">

        <a href="/">Home</a>
        <a href="/movies">Browse Movies</a>
        <a href="/movies/1/recommendations">🔥 Recommendations</a>

        <!-- Logged in: avatar + name + logout -->
        <div class="user-greeting" th:if="${session.loggedInUser != null}">
            <div class="user-avatar"
                 th:text="${#strings.toUpperCase(#strings.substring(session.loggedInUser.name, 0, 1))}">
                U
            </div>
            <span class="user-name">
                Hello, <span th:text="${session.loggedInUser.name}">User</span>
            </span>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>

        <!-- Not logged in: Register + Login -->
        <div th:if="${session.loggedInUser == null}">
            <a href="/register" style="margin-right:10px; color:#ccc; font-size:14px;">Register</a>
            <a href="/login" class="btn-login">Login</a>
        </div>

    </div>
</nav>

<div class="hero">

    <!-- Logged in hero -->
    <div th:if="${session.loggedInUser != null}">
        <p class="hero-welcome">
            👋 Welcome back, <span th:text="${session.loggedInUser.name}">User</span>!
        </p>
        <h1>What will you watch today?</h1>
    </div>

    <!-- Guest hero -->
    <div th:if="${session.loggedInUser == null}">
        <h1>Discover Your Next<br>Favorite Movie</h1>
    </div>

    <p>Smart recommendations powered by what you love</p>
    <div class="hero-buttons">
        <a href="/movies" class="btn-primary">Explore Movies</a>
        <a href="/movies/1/recommendations" class="btn-secondary">Get Recommendations</a>
    </div>
</div>

</body>
</html>
