<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Movies</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:28px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
box-shadow:0px 0px 10px black;
}

.card h3{
margin-top:0;
}

button{
padding:8px 15px;
border:none;
background:red;
color:white;
cursor:pointer;
}

a{
color:white;
text-decoration:none;
}

.add-btn{
margin:20px;
display:block;
text-align:center;
}

</style>

</head>

<body>

<header>

🎬 Movie Catalog

</header>

<a class="add-btn" href="/movies/new">

<button>Add Movie</button>

</a>

<div class="container">

<div class="card" th:each="movie : ${movies}">

<h3 th:text="${movie.title}"></h3>

<p>Genre: <span th:text="${movie.genre}"></span></p>

<p>Language: <span th:text="${movie.language}"></span></p>

<p>Rating: ⭐ <span th:text="${movie.rating}"></span></p>

<a th:href="@{/movies/edit/{id}(id=${movie.id})}">
<button>Edit</button>
</a>

<a th:href="@{/movies/delete/{id}(id=${movie.id})}">
<button>Delete</button>
</a>

<!-- ⭐ NEW RATE BUTTON -->
<a th:href="@{/ratings/add/{id}(id=${movie.id})}">
<button>Rate</button>
</a>

</div>
