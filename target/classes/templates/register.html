<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Register – MovieApp</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba") no-repeat center/cover;
    font-family: Arial;
}
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    justify-content: center;
    align-items: center;
}
.card {
    background: rgba(0,0,0,0.88);
    padding: 48px 44px;
    border-radius: 10px;
    color: white;
    width: 360px;
    border: 1px solid rgba(255,255,255,0.1);
}
.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 28px;
    color: white;
}
.logo span { color: red; }
h2 {
    font-size: 26px;
    margin-bottom: 6px;
}
.subtitle {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 28px;
}
label {
    font-size: 12px;
    color: #aaa;
    display: block;
    margin-bottom: 5px;
    margin-top: 16px;
}
input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    background: #222;
    border: 1px solid #444;
    border-radius: 5px;
    color: white;
    font-size: 14px;
}
input:focus {
    outline: none;
    border-color: red;
}
.error-box {
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.4);
    color: #f87171;
    padding: 10px 14px;
    border-radius: 5px;
    font-size: 13px;
    margin-bottom: 16px;
}
button {
    width: 100%;
    padding: 12px;
    background: red;
    border: none;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 24px;
}
button:hover { background: #cc0000; }
.footer-text {
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
}
.footer-text a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}
.footer-text a:hover { color: red; }
</style>
</head>
<body>
<div class="overlay">
    <div class="card">

        <div class="logo">🎬 Movie<span>App</span></div>

        <h2>Create account</h2>
        <p class="subtitle">Join MovieApp and start discovering films</p>

        <!-- Error message (e.g. email already exists) -->
        <div class="error-box" th:if="${error}" th:text="${error}"></div>

        <form action="/register" method="post" th:object="${user}">

            <label for="name">Full name</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Simon Jonathan" required />

            <label for="email">Email address</label>
            <input type="email" id="email" th:field="*{email}" placeholder="simonjonathan@simonmail.com" required />

            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" placeholder="S1mon1sKing" required />

            <button type="submit">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="/login">Sign in</a>
        </p>

    </div>
</div>
</body>
</html>
